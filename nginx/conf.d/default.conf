# Blue-green: upstream attivo. Per switchare, modifica "backend-blue" in "backend-green"
# e rilancia: docker exec cepu-nginx nginx -s reload

upstream backend_active {
    server backend-blue:8000;
    # server backend-green:8000 backup;  # backup = usa solo se blue è down
}

server {
    listen 80;
    server_name _;

    client_max_body_size 50M;

    location / {
        proxy_pass http://backend_active;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    location /health {
        proxy_pass http://backend_active/health;
        proxy_http_version 1.1;
        access_log off;
    }
}
