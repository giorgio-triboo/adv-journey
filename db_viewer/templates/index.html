{% extends "base.html" %}

{% block title %}Database Viewer - Tabelle{% endblock %}

{% block content %}
<div class="card">
    <h2>Tabelle del Database</h2>
    <p>Seleziona una tabella per visualizzare i dati</p>
    
    <div class="table-grid">
        {% for table in tables %}
        <div class="table-card" onclick="window.location.href='/table/{{ table }}'">
            <h3>{{ table }}</h3>
            <div class="count">{{ table_stats[table]['count'] }} record</div>
        </div>
        {% endfor %}
    </div>
</div>
{% endblock %}
