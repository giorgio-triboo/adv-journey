# AWS CodeDeploy - cepu-lavorazioni
# Deploy: codice copiato sul server; build Docker e avvio in AfterInstall

version: 0.0
os: linux
files:
  - source: /
    destination: /home/ec2-user/cepu-lavorazioni

file_exists_behavior: OVERWRITE

permissions:
  - object: /home/ec2-user/cepu-lavorazioni
    owner: ec2-user
    group: ec2-user
    mode: 755

hooks:
  ApplicationStop:
    - location: scripts/stop.sh
      timeout: 300
      runas: root
  AfterInstall:
    - location: afterinstall.sh
      timeout: 600
      runas: root
