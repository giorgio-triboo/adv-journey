services:
  backend:
    build:
      context: .
      dockerfile: ./backend/Dockerfile
    ports:
      - "8000:8000"
    volumes:
      # In sviluppo: bind mount per hot-reload
      - ./backend:/app
      - ./frontend:/app/frontend
    environment:
      - DATABASE_URL=postgresql://user:password@db:5432/cepudb
      - PLAYWRIGHT_BROWSERS_PATH=/ms-playwright
    depends_on:
      - db
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload



  db:
    image: postgres:15-alpine
    restart: always
    environment:
      - POSTGRES_USER=user
      - POSTGRES_PASSWORD=password
      - POSTGRES_DB=cepudb
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
