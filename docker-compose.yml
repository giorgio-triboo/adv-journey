services:
  backend:
    build:
      context: .
      dockerfile: ./backend/Dockerfile
    ports:
      - "8003:8000"
    volumes:
      # In sviluppo: bind mount per hot-reload
      - ./backend:/app
      - ./frontend:/app/frontend
    environment:
      - DATABASE_URL=postgresql://user:password@db:5432/cepudb
      - PLAYWRIGHT_BROWSERS_PATH=/ms-playwright
      - TZ=Europe/Rome
    depends_on:
      - db
      - redis
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload
  
  backend-worker:
    build:
      context: .
      dockerfile: ./backend/Dockerfile
    depends_on:
      - db
      - redis
    volumes:
      - ./backend:/app
      - ./frontend:/app/frontend
    environment:
      - DATABASE_URL=postgresql://user:password@db:5432/cepudb
      - PLAYWRIGHT_BROWSERS_PATH=/ms-playwright
      - TZ=Europe/Rome
    command: celery -A celery_app.celery_app worker --loglevel=INFO
    # Celery non espone HTTP: usa inspect ping invece del healthcheck uvicorn ereditato
    healthcheck:
      test: ["CMD-SHELL", "celery -A celery_app.celery_app inspect ping || exit 1"]
      interval: 30s
      timeout: 10s
      start_period: 40s
      retries: 3

  redis:
    image: redis:7-alpine
    restart: always
    ports:
      - "6380:6379"

  db:
    image: postgres:15-alpine
    restart: always
    environment:
      - POSTGRES_USER=user
      - POSTGRES_PASSWORD=password
      - POSTGRES_DB=cepudb
      - TZ=Europe/Rome
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  adminer:
    image: adminer:latest
    restart: always
    ports:
      - "18080:8080"
    environment:
      - ADMINER_DEFAULT_SERVER=db
    depends_on:
      - db

volumes:
  postgres_data:
