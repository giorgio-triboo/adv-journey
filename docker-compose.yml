services:
  backend:
    build:
      context: .
      dockerfile: ./backend/Dockerfile
    ports:
      - "8003:8000"
    volumes:
      # In sviluppo: bind mount per hot-reload
      - ./backend:/app
      - ./frontend:/app/frontend
    environment:
      - DATABASE_URL=postgresql://user:password@db:5432/cepudb
      - PLAYWRIGHT_BROWSERS_PATH=/ms-playwright
      - TZ=Europe/Rome
    depends_on:
      - db
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload



  db:
    image: postgres:15-alpine
    restart: always
    environment:
      - POSTGRES_USER=user
      - POSTGRES_PASSWORD=password
      - POSTGRES_DB=cepudb
      - TZ=Europe/Rome
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  adminer:
    image: adminer:latest
    restart: always
    ports:
      - "8080:8080"
    environment:
      - ADMINER_DEFAULT_SERVER=db
    depends_on:
      - db

  db_viewer:
    build:
      context: ./db_viewer
      dockerfile: Dockerfile
    ports:
      - "8081:5000"
    volumes:
      - ./db_viewer:/app
    environment:
      - DATABASE_URL=postgresql://user:password@db:5432/cepudb
    depends_on:
      - db

volumes:
  postgres_data:
