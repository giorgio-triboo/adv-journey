# Upstream produzione: singolo backend (blue)
# Nessun backend-green / blue-green attivo in questo ambiente.
# Usa DNS Docker + 'resolve' per evitare di fissare l'IP del container:
# quando il container backend-blue viene ricreato e cambia IP, nginx
# risolve di nuovo il nome senza richiedere un reload manuale.
server backend-blue:8000 resolve;
