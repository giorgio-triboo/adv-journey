# Nginx reverse proxy - listen 80 interno, esposto su host 3000
# Upstream definito in upstream.conf (blue/green)

worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type application/octet-stream;
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" "$http_user_agent"';
    access_log /var/log/nginx/access.log main;
    sendfile on;
    keepalive_timeout 65;
    client_max_body_size 50M;
    gzip on;

    # Usa il resolver DNS interno di Docker per i backend (es. backend-blue)
    # in modo che nginx non rimanga fissato a un vecchio IP del container.
    resolver 127.0.0.11 valid=30s ipv6=off;

    upstream backend_active {
        include /etc/nginx/conf.d/upstream.conf;
    }

    upstream adminer {
        server adminer:8080;
    }

    # Preserva X-Forwarded-Proto da upstream (ALB/proxy): se non presente usa $scheme
    map $http_x_forwarded_proto $forwarded_proto {
        default $http_x_forwarded_proto;
        ''      $scheme;
    }

    server {
        listen 80;
        server_name _;

        # Auth check per Adminer (solo super-admin OAuth)
        location = /api/auth/adminer-check {
            internal;
            proxy_pass http://backend_active;
            proxy_pass_request_body off;
            proxy_set_header Content-Length "";
            proxy_set_header X-Original-URI $request_uri;
        }

        # Adminer protetto da OAuth super-admin
        location /adminer {
            auth_request /api/auth/adminer-check;
            auth_request_set $auth_status $upstream_status;
            rewrite ^/adminer/?(.*)$ /$1 break;
            proxy_pass http://adminer;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $forwarded_proto;
        }

        location / {
            proxy_pass http://backend_active;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $forwarded_proto;
            proxy_connect_timeout 60s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;
        }

        # Healthcheck: risponde 200 direttamente da nginx, indipendente dal backend.
        # Il backend ha comunque il suo /health su :8000 per debug applicativo.
        location /health {
            access_log off;
            add_header Content-Type text/plain;
            return 200 "OK\n";
        }
    }
}
