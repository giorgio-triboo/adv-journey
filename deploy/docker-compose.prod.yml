# Cepu-lavorazioni - produzione
# Uso: docker compose -f deploy/docker-compose.prod.yml up -d
# Con blue-green: -f deploy/docker-compose.bluegreen.yml
# Porta principale: 80 (nginx reverse proxy)

services:
  nginx:
    image: nginx:alpine
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./deploy/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./deploy/nginx/upstream.conf:/etc/nginx/conf.d/upstream.conf:ro
      - nginx_cache:/var/cache/nginx
    depends_on:
      - backend-blue
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "-", "http://localhost:80/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  backend-blue:
    build:
      context: .
      dockerfile: deploy/Dockerfile
    image: cepu-lavorazioni-app:latest
    restart: always
    expose:
      - "8000"
    environment:
      - DATABASE_URL=${DATABASE_URL:-postgresql://user:password@db:5432/cepudb}
      - PLAYWRIGHT_BROWSERS_PATH=/ms-playwright
      - TZ=Europe/Rome
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    command: uvicorn main:app --host 0.0.0.0 --port 8000
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s

  backend-green:
    profiles:
      - green
    build:
      context: .
      dockerfile: deploy/Dockerfile
    image: cepu-lavorazioni-app:latest
    restart: always
    expose:
      - "8000"
    environment:
      - DATABASE_URL=${DATABASE_URL:-postgresql://user:password@db:5432/cepudb}
      - PLAYWRIGHT_BROWSERS_PATH=/ms-playwright
      - TZ=Europe/Rome
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    command: uvicorn main:app --host 0.0.0.0 --port 8000
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s

  backend-worker:
    image: cepu-lavorazioni-app:latest
    restart: always
    environment:
      - DATABASE_URL=${DATABASE_URL:-postgresql://user:password@db:5432/cepudb}
      - PLAYWRIGHT_BROWSERS_PATH=/ms-playwright
      - TZ=Europe/Rome
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    # --concurrency=1: Playwright in sequenza (minor uso RAM su t4g.small)
    command: celery -A celery_app.celery_app worker --loglevel=INFO --concurrency=1

  redis:
    image: redis:7-alpine
    restart: always

  db:
    image: postgres:15-alpine
    restart: always
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-user}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-password}
      - POSTGRES_DB=${POSTGRES_DB:-cepudb}
      - TZ=Europe/Rome
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -h localhost -U $${POSTGRES_USER:-user} -d $${POSTGRES_DB:-cepudb} || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  adminer:
    image: adminer:latest
    restart: always
    ports:
      - "18080:8080"
    environment:
      - ADMINER_DEFAULT_SERVER=db
    depends_on:
      - db

volumes:
  postgres_data:
  nginx_cache:
