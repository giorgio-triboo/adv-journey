<!-- Summary Stats -->
<div class="grid grid-cols-1 gap-6 sm:grid-cols-2 lg:grid-cols-5 mb-8">
    <div class="glass-card p-6 flex items-center border-l-4 border-blue-400">
        <div class="bg-blue-100/50 p-3 rounded-xl mr-4"><svg class="h-6 w-6 text-blue-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197M13 7a4 4 0 11-8 0 4 4 0 018 0z"/></svg></div>
        <div><p class="text-sm font-medium text-neutral-500">Totale</p><p class="text-2xl font-bold text-neutral-900">{{ stats.total }}</p></div>
    </div>
    <div class="glass-card p-6 flex items-center border-l-4 border-yellow-400">
        <div class="bg-yellow-100/50 p-3 rounded-xl mr-4"><svg class="h-6 w-6 text-yellow-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"/></svg></div>
        <div><p class="text-sm font-medium text-neutral-500">In Lavorazione</p><p class="text-2xl font-bold text-neutral-900">{{ stats.in_lavorazione }}</p></div>
    </div>
    <div class="glass-card p-6 flex items-center border-l-4 border-red-400">
        <div class="bg-red-100/50 p-3 rounded-xl mr-4"><svg class="h-6 w-6 text-red-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg></div>
        <div><p class="text-sm font-medium text-neutral-500">Rifiutati</p><p class="text-2xl font-bold text-neutral-900">{{ stats.rifiutati }}</p></div>
    </div>
    <div class="glass-card p-6 flex items-center border-l-4 border-blue-400">
        <div class="bg-blue-100/50 p-3 rounded-xl mr-4"><svg class="h-6 w-6 text-blue-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/></svg></div>
        <div><p class="text-sm font-medium text-neutral-500">CRM</p><p class="text-2xl font-bold text-neutral-900">{{ stats.crm }}</p></div>
    </div>
    <div class="glass-card p-6 flex items-center border-l-4 border-green-400">
        <div class="bg-green-100/50 p-3 rounded-xl mr-4"><svg class="h-6 w-6 text-green-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/></svg></div>
        <div><p class="text-sm font-medium text-neutral-500">Tasso Conversione</p><p class="text-2xl font-bold text-neutral-900">{{ "%.1f"|format(stats.conversion_rate) }}%</p></div>
    </div>
</div>

<!-- Filters -->
<div class="glass-card mb-6 p-4">
    <form method="GET" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4" id="lavorazioniFilterForm">
        <div>
            <label class="block text-xs font-semibold text-neutral-500 uppercase mb-1">Stato Lavorazione</label>
            <select name="status_category" class="w-full px-4 py-2 rounded-lg border border-neutral-200 focus:ring-2 focus:ring-indigo-500 outline-none">
                <option value="">Tutti</option>
                {% for status in status_categories %}
                <option value="{{ status.value }}" {% if selected_status_category == status.value %}selected{% endif %}>{{ status.label }}</option>
                {% endfor %}
            </select>
        </div>
        <div>
            <label class="block text-xs font-semibold text-neutral-500 uppercase mb-1">Campagna</label>
            <select name="campaign_id" class="w-full px-4 py-2 rounded-lg border border-neutral-200 focus:ring-2 focus:ring-indigo-500 outline-none">
                <option value="">Tutte</option>
                {% for campaign in campaigns %}
                <option value="{{ campaign.magellano_ids[0] if campaign.magellano_ids else '' }}" {% if selected_campaign_id == (campaign.magellano_ids[0] if campaign.magellano_ids else '') %}selected{% endif %}>{{ campaign.name or campaign.cliente_name }}</option>
                {% endfor %}
            </select>
        </div>
        <div class="sm:col-span-2 lg:col-span-2">
            <label class="block text-xs font-semibold text-neutral-500 uppercase mb-1">Periodo</label>
            <input type="text" id="lavorazioniDateRange" class="w-full px-4 py-2 rounded-lg border border-neutral-200 focus:ring-2 focus:ring-indigo-500 outline-none cursor-pointer" placeholder="Seleziona intervallo">
            <input type="hidden" name="date_from" id="lavorazioniDateFrom" value="{{ date_from }}">
            <input type="hidden" name="date_to" id="lavorazioniDateTo" value="{{ date_to }}">
        </div>
        <div class="sm:col-span-2 lg:col-span-4 flex gap-2">
            <button type="submit" class="px-6 py-2 bg-indigo-600 text-white font-semibold rounded-lg hover:bg-indigo-700 shadow-md shadow-indigo-200 transition-all active:scale-95">Applica Filtri</button>
            <a href="{{ request.url.path }}" class="px-6 py-2 bg-neutral-100 text-neutral-700 font-semibold rounded-lg hover:bg-neutral-200 transition-all">Reset</a>
            <button type="button" id="lavorazioniExportButton" class="px-6 py-2 bg-emerald-600 text-white font-semibold rounded-lg hover:bg-emerald-700 transition-all">Export CSV (email)</button>
        </div>
    </form>
</div>

<script>
document.addEventListener('DOMContentLoaded', function () {
    const exportButton = document.getElementById('lavorazioniExportButton');
    const filterForm = document.getElementById('lavorazioniFilterForm');
    if (!exportButton || !filterForm) return;

    exportButton.addEventListener('click', async function () {
        const formData = new FormData(filterForm);
        const params = new URLSearchParams();
        const subsection = (window.location.pathname.split('/')[2] || 'ulixe').toLowerCase();
        params.set('subsection', subsection);
        for (const [key, value] of formData.entries()) {
            params.set(key, String(value || ''));
        }
        exportButton.disabled = true;
        const originalLabel = exportButton.textContent;
        exportButton.textContent = 'Export in corso...';
        try {
            const response = await fetch(`/api/lavorazioni/export-request?${params.toString()}`);
            const data = await response.json();
            if (!response.ok) {
                throw new Error(data.error || 'Errore avvio export');
            }
            alert(data.message || 'Export avviato correttamente.');
        } catch (error) {
            alert(error.message || 'Errore avvio export.');
        } finally {
            exportButton.disabled = false;
            exportButton.textContent = originalLabel;
        }
    });
});
</script>
