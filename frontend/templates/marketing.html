{% extends "base.html" %}

{% block content %}
<div class="animate-fadeInUp">
    <div class="mb-8">
        <h1 class="text-3xl font-bold gradient-text">Marketing</h1>
        <p class="text-neutral-500 mt-2">
            Vista gerarchica Campagne → AdSet → Creatività con metriche aggregate.
        </p>
    </div>

    <!-- Vista Gerarchica -->
    <!-- Filters -->
    <div class="glass-card mb-6 p-4">
        <form id="filterForm">
            <!-- Prima riga: Account, Stato, Date, Bottone -->
            <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-5 gap-4 mb-4">
                <div>
                    <label class="block text-xs font-semibold text-neutral-500 uppercase mb-1">Account</label>
                    <select id="accountFilter" onchange="applyFilters()"
                            class="w-full px-4 py-2 rounded-lg border border-neutral-200 focus:ring-2 focus:ring-indigo-500 outline-none">
                        <option value="">Tutti gli account</option>
                    </select>
                </div>
                <div>
                    <label class="block text-xs font-semibold text-neutral-500 uppercase mb-1">Stato</label>
                    <select id="statusFilter" onchange="applyFilters()"
                            class="w-full px-4 py-2 rounded-lg border border-neutral-200 focus:ring-2 focus:ring-indigo-500 outline-none">
                        <option value="all">Tutte</option>
                        <option value="active">Attive</option>
                        <option value="inactive">Non attive</option>
                    </select>
                </div>
                <div class="sm:col-span-2 lg:col-span-2">
                    <label class="block text-xs font-semibold text-neutral-500 uppercase mb-1">Periodo</label>
                    <input type="text" id="marketingDateRange"
                           class="w-full px-4 py-2 rounded-lg border border-neutral-200 focus:ring-2 focus:ring-indigo-500 outline-none cursor-pointer"
                           placeholder="Seleziona intervallo">
                    <input type="hidden" id="dateFrom" name="date_from">
                    <input type="hidden" id="dateTo" name="date_to">
                </div>
                <div class="flex items-end">
                    <button type="button" onclick="applyFilters()" 
                            class="w-full px-6 py-2 bg-indigo-600 text-white font-semibold rounded-lg hover:bg-indigo-700 shadow-md shadow-indigo-200 transition-all active:scale-95">
                        Applica Filtri
                    </button>
                </div>
            </div>
            <!-- Seconda riga: Filtri per nome -->
            <div class="grid grid-cols-1 sm:grid-cols-3 gap-4">
                <div>
                    <label class="block text-xs font-semibold text-neutral-500 uppercase mb-1">Nome Campagna</label>
                    <input type="text" id="campaignNameFilter" placeholder="Cerca campagna..."
                           class="w-full px-4 py-2 rounded-lg border border-neutral-200 focus:ring-2 focus:ring-indigo-500 outline-none">
                </div>
                <div>
                    <label class="block text-xs font-semibold text-neutral-500 uppercase mb-1">Nome AdSet</label>
                    <input type="text" id="adsetNameFilter" placeholder="Cerca adset..."
                           class="w-full px-4 py-2 rounded-lg border border-neutral-200 focus:ring-2 focus:ring-indigo-500 outline-none">
                </div>
                <div>
                    <label class="block text-xs font-semibold text-neutral-500 uppercase mb-1">Nome Inserzione</label>
                    <input type="text" id="adNameFilter" placeholder="Cerca inserzione..."
                           class="w-full px-4 py-2 rounded-lg border border-neutral-200 focus:ring-2 focus:ring-indigo-500 outline-none">
                </div>
            </div>
        </form>
    </div>

    <!-- Summary Cards (bianche) -->
    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6 mb-6">
        <div class="glass-card p-6 flex items-center bg-white border border-neutral-200">
            <div class="p-3 rounded-xl mr-4">
                <svg class="h-6 w-6 text-neutral-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/>
                </svg>
            </div>
            <div>
                <p class="text-sm font-medium text-neutral-500">Entrate Magellano</p>
                <p class="text-2xl font-bold text-neutral-900" id="totalMagellanoEntrate">0</p>
            </div>
        </div>
        <div class="glass-card p-6 flex items-center bg-white border border-neutral-200">
            <div class="p-3 rounded-xl mr-4">
                <svg class="h-6 w-6 text-neutral-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8"/>
                </svg>
            </div>
            <div>
                <p class="text-sm font-medium text-neutral-500">Inviate Magellano</p>
                <p class="text-2xl font-bold text-neutral-900" id="totalMagellanoInviate">0</p>
            </div>
        </div>
        <div class="glass-card p-6 flex items-center bg-white border border-neutral-200">
            <div class="p-3 rounded-xl mr-4">
                <svg class="h-6 w-6 text-neutral-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"/>
                </svg>
            </div>
            <div>
                <p class="text-sm font-medium text-neutral-500">In Lavorazione Ulixe</p>
                <p class="text-2xl font-bold text-neutral-900" id="totalUlixeLavorazione">0</p>
            </div>
        </div>
        <div class="glass-card p-6 flex items-center bg-white border border-neutral-200">
            <div class="p-3 rounded-xl mr-4">
                <svg class="h-6 w-6 text-neutral-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/>
                </svg>
            </div>
            <div>
                <p class="text-sm font-medium text-neutral-500">Chiusure Ulixe</p>
                <p class="text-2xl font-bold text-neutral-900" id="totalUlixeChiusure">0</p>
            </div>
        </div>
    </div>

    <!-- Hierarchical Expandable Structure -->
    <div class="glass-card mb-6 overflow-hidden">
        <div id="hierarchicalContainer" class="divide-y divide-neutral-200">
            <!-- Campaigns will be loaded here -->
        </div>
    </div>

</div>

<script>
// Set default dates e inizializza date range picker
document.addEventListener('DOMContentLoaded', function() {
    const hiddenFrom = document.getElementById('dateFrom');
    const hiddenTo = document.getElementById('dateTo');
    const rangeInput = document.getElementById('marketingDateRange');

    if (hiddenFrom && hiddenTo && rangeInput && window.DateRangePicker && window.moment) {
        const start = hiddenFrom.value ? moment(hiddenFrom.value, 'YYYY-MM-DD') : moment('2026-01-01');
        const end = hiddenTo.value ? moment(hiddenTo.value, 'YYYY-MM-DD') : moment('2026-01-31');

        hiddenFrom.value = start.format('YYYY-MM-DD');
        hiddenTo.value = end.format('YYYY-MM-DD');

        new DateRangePicker(rangeInput, {
            startDate: start,
            endDate: end,
            autoApply: true,
            alwaysShowCalendars: true,
            opens: 'left',
            maxSpan: { days: 365 },
            locale: {
                format: 'DD/MM/YYYY',
                separator: ' al ',
                applyLabel: 'Aggiorna',
                cancelLabel: 'Annulla',
                weekLabel: 'Set',
                daysOfWeek: ['Dom', 'Lun', 'Mar', 'Mer', 'Gio', 'Ven', 'Sab'],
                monthNames: ['Gennaio', 'Febbraio', 'Marzo', 'Aprile', 'Maggio', 'Giugno', 'Luglio', 'Agosto', 'Settembre', 'Ottobre', 'Novembre', 'Dicembre'],
                firstDay: 1
            },
            ranges: {
                'Oggi': [moment(), moment()],
                'Ieri': [moment().subtract(1, 'days'), moment().subtract(1, 'days')],
                'Ultimi 7 giorni': [moment().subtract(6, 'days'), moment()],
                'Ultimi 14 giorni': [moment().subtract(13, 'days'), moment()],
                'Ultimi 28 giorni': [moment().subtract(27, 'days'), moment()],
                'Ultimi 30 giorni': [moment().subtract(29, 'days'), moment()],
                'Ultimi 60 giorni': [moment().subtract(59, 'days'), moment()],
                'Gennaio 2026': [moment('2026-01-01'), moment('2026-01-31')],
                'Questa settimana': [moment().startOf('week').add(1, 'days'), moment().endOf('week').add(1, 'days')],
                'Settimana scorsa': [
                    moment().subtract(1, 'week').startOf('week').add(1, 'days'),
                    moment().subtract(1, 'week').endOf('week').add(1, 'days')
                ],
                'Questo mese': [moment().startOf('month'), moment().endOf('month')],
                'Mese scorso': [
                    moment().subtract(1, 'month').startOf('month'),
                    moment().subtract(1, 'month').endOf('month')
                ]
            }
        }, function (startDate, endDate) {
            hiddenFrom.value = startDate.format('YYYY-MM-DD');
            hiddenTo.value = endDate.format('YYYY-MM-DD');
            applyFilters();
        });
    } else if (hiddenFrom && hiddenTo) {
        const today = new Date();
        const thirtyDaysAgo = new Date();
        thirtyDaysAgo.setDate(today.getDate() - 30);
        hiddenFrom.value = thirtyDaysAgo.toISOString().split('T')[0];
        hiddenTo.value = today.toISOString().split('T')[0];
    }
    
    // Load accounts and campaigns on page load
    loadAccounts();
    loadAllCampaigns();
});

let campaignsData = [];
let accountsData = [];
let adsetsData = {}; // campaignId -> adsets array
let adsData = {}; // adsetId -> ads array

async function loadAccounts() {
    try {
        const response = await fetch('/api/marketing/accounts');
        accountsData = await response.json();
        
        const accountSelect = document.getElementById('accountFilter');
        accountSelect.innerHTML = '<option value="">Tutti gli account</option>';
        
        accountsData.forEach(account => {
            const option = document.createElement('option');
            option.value = account.id;
            option.textContent = account.name || account.account_id;
            accountSelect.appendChild(option);
        });
    } catch (error) {
        console.error('Error loading accounts:', error);
    }
}

async function applyFilters() {
    loadAllCampaigns();
}

async function loadAllCampaigns() {
    const container = document.getElementById('hierarchicalContainer');
    container.innerHTML = '<div class="p-4 text-center text-neutral-500">Caricamento...</div>';
    
    const dateFrom = document.getElementById('dateFrom').value;
    const dateTo = document.getElementById('dateTo').value;
    const accountId = document.getElementById('accountFilter').value;
    const status = document.getElementById('statusFilter').value;
    const campaignName = document.getElementById('campaignNameFilter').value.trim();
    const adsetName = document.getElementById('adsetNameFilter').value.trim();
    const adName = document.getElementById('adNameFilter').value.trim();
    
    // Se c'è un filtro per ad_name, mostra direttamente le ads
    if (adName) {
        await loadAdsDirectly(dateFrom, dateTo, accountId, status, campaignName, adsetName, adName);
        return;
    }
    
    // Se c'è un filtro per adset_name, mostra direttamente gli adsets
    if (adsetName) {
        await loadAdsetsDirectly(dateFrom, dateTo, accountId, status, campaignName, adsetName);
        return;
    }
    
    // Altrimenti mostra le campagne normalmente
    let url = `/api/marketing/campaigns?date_from=${dateFrom}&date_to=${dateTo}`;
    if (accountId) {
        url += `&account_id=${accountId}`;
    }
    if (status && status !== 'all') {
        url += `&status=${status}`;
    }
    if (campaignName) {
        url += `&campaign_name=${encodeURIComponent(campaignName)}`;
    }
    
    try {
        const response = await fetch(url);
        if (!response.ok) {
            const errorText = await response.text();
            console.error('Errore risposta API:', response.status, errorText);
            let errorMessage = 'Errore nel caricamento delle campagne';
            try {
                const errorData = JSON.parse(errorText);
                if (errorData.error) {
                    errorMessage = errorData.error;
                }
            } catch (e) {
                // Ignora se non è JSON
            }
            container.innerHTML = `<div class="p-4 text-center text-red-500">${errorMessage}</div>`;
            updateSummaryCards({ 
                total_magellano_entrate: 0, 
                total_magellano_inviate: 0, 
                total_ulixe_lavorazione: 0, 
                total_ulixe_chiusure: 0 
            });
            return;
        }
        
        let data;
        try {
            data = await response.json();
        } catch (jsonError) {
            console.error('Errore parsing JSON:', jsonError);
            container.innerHTML = '<div class="p-4 text-center text-red-500">Errore nel formato della risposta</div>';
            updateSummaryCards({ 
                total_magellano_entrate: 0, 
                total_magellano_inviate: 0, 
                total_ulixe_lavorazione: 0, 
                total_ulixe_chiusure: 0 
            });
            return;
        }
        
        // Gestisci sia formato nuovo (con campaigns e totals) che vecchio (solo array)
        if (Array.isArray(data)) {
            campaignsData = data;
        } else if (data && Array.isArray(data.campaigns)) {
            campaignsData = data.campaigns;
        } else {
            console.error('Formato risposta non valido:', data);
            container.innerHTML = '<div class="p-4 text-center text-red-500">Formato risposta non valido</div>';
            updateSummaryCards({ 
                total_magellano_entrate: 0, 
                total_magellano_inviate: 0, 
                total_ulixe_lavorazione: 0, 
                total_ulixe_chiusure: 0 
            });
            return;
        }
        
        // Aggiorna le card riepilogative se disponibili
        if (data.totals) {
            updateSummaryCards(data.totals);
        } else {
            // Calcola totali lato client se non disponibili
            calculateAndUpdateSummaryCards();
        }
        
        console.log('Campagne ricevute:', campaignsData.length);
        if (campaignsData.length > 0) {
            console.log('Prima campagna (esempio):', campaignsData[0]);
            console.log('Lead:', campaignsData[0].total_leads, 'CPL:', campaignsData[0].cpl_meta, 'Spend:', campaignsData[0].spend);
        }
        
        container.innerHTML = '';
        
        if (campaignsData.length === 0) {
            container.innerHTML = '<div class="p-4 text-center text-neutral-500">Nessuna campagna disponibile</div>';
            updateSummaryCards({ 
                total_magellano_entrate: 0, 
                total_magellano_inviate: 0, 
                total_ulixe_lavorazione: 0, 
                total_ulixe_chiusure: 0 
            });
            return;
        }
        
        // Group campaigns by account
        const campaignsByAccount = {};
        campaignsData.forEach(campaign => {
            const accountId = campaign.account_id || 'no-account';
            const accountName = campaign.account_name || 'Account non specificato';
            
            if (!campaignsByAccount[accountId]) {
                campaignsByAccount[accountId] = {
                    id: accountId,
                    name: accountName,
                    campaigns: []
                };
            }
            campaignsByAccount[accountId].campaigns.push(campaign);
        });
        
        // Display campaigns grouped by account
        Object.values(campaignsByAccount).forEach(accountGroup => {
            // Account header
            const accountHeader = document.createElement('div');
            accountHeader.className = 'account-header bg-indigo-50 border-b-2 border-indigo-200';
            accountHeader.innerHTML = `
                <div class="px-6 py-4">
                    <h3 class="text-lg font-semibold text-indigo-900">${escapeHtml(accountGroup.name)}</h3>
                    <p class="text-sm text-indigo-600">${accountGroup.campaigns.length} campagna${accountGroup.campaigns.length !== 1 ? 'e' : ''}</p>
                </div>
            `;
            container.appendChild(accountHeader);
            
            // Campaigns for this account
            accountGroup.campaigns.forEach(campaign => {
                const campaignRow = createCampaignRow(campaign);
                container.appendChild(campaignRow);
            });
        });
    } catch (error) {
        console.error('Error loading campaigns:', error);
        container.innerHTML = `<div class="p-4 text-center text-red-500">Errore nel caricamento delle campagne: ${error.message || error}</div>`;
        updateSummaryCards({ 
            total_magellano_entrate: 0, 
            total_magellano_inviate: 0, 
            total_ulixe_lavorazione: 0, 
            total_ulixe_chiusure: 0 
        });
    }
}

function createCampaignRow(campaign) {
    const row = document.createElement('div');
    row.className = 'campaign-row';
    row.dataset.campaignId = campaign.id;
    
    // Format CPL Meta with comma as decimal separator
    let cplDisplay = '-';
    if (campaign.cpl_meta !== undefined && campaign.cpl_meta !== null) {
        if (campaign.cpl_meta > 0) {
        cplDisplay = `€${campaign.cpl_meta.toFixed(2).replace('.', ',')}`;
        } else {
            cplDisplay = '€0,00';
        }
    }
    console.log('Campaign CPL:', campaign.cpl_meta, 'Display:', cplDisplay, 'Total leads:', campaign.total_leads);
    
    // Status: pallino verde se attiva, grigio se non attiva
    const isActive = (campaign.status || '').toUpperCase() === 'ACTIVE';
    const statusLabel = campaign.status ? ` (${campaign.status})` : '';
    const statusDot = isActive 
        ? '<span class="inline-block w-2.5 h-2.5 rounded-full bg-green-500 shrink-0" title="Attiva' + statusLabel + '"></span>'
        : '<span class="inline-block w-2.5 h-2.5 rounded-full bg-gray-400 shrink-0" title="Non attiva' + statusLabel + '"></span>';
    
    row.innerHTML = `
        <div class="flex items-center justify-between p-4 hover:bg-neutral-50 cursor-pointer transition-colors" onclick="toggleCampaign(${campaign.id})">
            <div class="flex items-center gap-3 flex-1">
                <svg class="expand-icon w-5 h-5 text-neutral-400 transition-transform" id="icon-campaign-${campaign.id}" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/>
                </svg>
                <div class="flex-1">
                    <div class="font-semibold text-neutral-900">${escapeHtml(campaign.name)}</div>
                    <div class="text-sm text-neutral-500 flex items-center gap-2">
                        ${statusDot}
                        Campagna
                    </div>
                </div>
            </div>
            <div class="flex items-center gap-8 text-sm">
                <!-- Dati Meta -->
                <div class="flex items-center gap-4 border-r border-neutral-200 pr-6">
                <div class="text-right">
                        <div class="text-xs font-semibold text-neutral-900 uppercase mb-1">Dati Meta</div>
                        <div class="flex items-center gap-3">
                            <div>
                                <div class="text-neutral-400 text-xs">Lead</div>
                                <div class="font-semibold text-neutral-900">${campaign.total_leads || 0}</div>
                            </div>
                            <div>
                                <div class="text-neutral-400 text-xs">CPL</div>
                                <div class="font-semibold text-neutral-900">${cplDisplay}</div>
                            </div>
                            <div>
                                <div class="text-neutral-400 text-xs">Speso</div>
                                <div class="font-semibold text-neutral-900">€${(campaign.spend || 0).toFixed(2).replace('.', ',')}</div>
                            </div>
                        </div>
                    </div>
                </div>
                <!-- Ingresso Magellano -->
                <div class="flex items-center gap-4 border-r border-neutral-200 pr-6">
                    <div class="text-right">
                        <div class="text-xs font-semibold text-neutral-900 uppercase mb-1">Ingresso Magellano</div>
                        <div class="flex items-center gap-3">
                            <div>
                                <div class="text-neutral-400 text-xs">Entrate</div>
                                <div class="font-semibold text-neutral-900">${campaign.magellano_entrate || 0}</div>
                            </div>
                            <div>
                                <div class="text-neutral-400 text-xs">CPL</div>
                                <div class="font-semibold text-neutral-900">${campaign.cpl_ingresso !== undefined && campaign.cpl_ingresso !== null ? (campaign.cpl_ingresso > 0 ? '€' + campaign.cpl_ingresso.toFixed(2).replace('.', ',') : '€0,00') : '-'}</div>
                            </div>
                            <div>
                                <div class="text-neutral-400 text-xs">Scartate</div>
                                <div class="font-semibold text-neutral-900">${campaign.magellano_scartate || 0}</div>
                            </div>
                            <div>
                                <div class="text-neutral-400 text-xs">% Scarto</div>
                                <div class="font-semibold text-neutral-900">${campaign.magellano_scarto_pct_ingresso !== undefined && campaign.magellano_scarto_pct_ingresso !== null ? campaign.magellano_scarto_pct_ingresso.toFixed(2).replace('.', ',') + '%' : '0,00%'}</div>
                            </div>
                        </div>
                    </div>
                </div>
                <!-- Uscita Magellano -->
                <div class="flex items-center gap-4 border-r border-neutral-200 pr-6">
                    <div class="text-right">
                        <div class="text-xs font-semibold text-neutral-900 uppercase mb-1">Uscita Magellano</div>
                        <div class="flex items-center gap-3">
                            <div>
                                <div class="text-neutral-400 text-xs">Inviate</div>
                                <div class="font-semibold text-neutral-900">${campaign.magellano_inviate || 0}</div>
                            </div>
                            <div>
                                <div class="text-neutral-400 text-xs">CPL</div>
                                <div class="font-semibold text-neutral-900">${campaign.cpl_uscita !== undefined && campaign.cpl_uscita !== null ? (campaign.cpl_uscita > 0 ? '€' + campaign.cpl_uscita.toFixed(2).replace('.', ',') : '€0,00') : '-'}</div>
                            </div>
                            <div>
                                <div class="text-neutral-400 text-xs">Rifiutate</div>
                                <div class="font-semibold text-neutral-900">${campaign.magellano_rifiutate || 0}</div>
                            </div>
                            <div>
                                <div class="text-neutral-400 text-xs">% Scarto</div>
                                <div class="font-semibold text-neutral-900">${campaign.magellano_scarto_pct_uscita !== undefined && campaign.magellano_scarto_pct_uscita !== null ? campaign.magellano_scarto_pct_uscita.toFixed(2).replace('.', ',') + '%' : '0,00%'}</div>
                            </div>
                        </div>
                    </div>
                </div>
                <!-- Margine % -->
                <div class="flex items-center gap-4">
                    <div class="text-right">
                        <div class="text-xs font-semibold text-neutral-900 uppercase mb-1">Margine %</div>
                        <div class="font-semibold text-neutral-900">${campaign.margine_pct != null ? campaign.margine_pct.toFixed(2).replace('.', ',') + '%' : 'N/D'}</div>
                    </div>
                </div>
                <!-- Ulixe -->
                <div class="flex items-center gap-4">
                    <div class="text-right">
                        <div class="text-xs font-semibold text-neutral-900 uppercase mb-1">Ulixe</div>
                        <div class="flex items-center gap-3">
                            <div>
                                <div class="text-neutral-400 text-xs">Lavorazione</div>
                                <div class="font-semibold text-neutral-900">${campaign.ulixe_lavorazione || 0}</div>
                            </div>
                            <div>
                                <div class="text-neutral-400 text-xs">Rifiutate</div>
                                <div class="font-semibold text-neutral-900">${campaign.ulixe_rifiutate || 0}</div>
                            </div>
                            <div>
                                <div class="text-neutral-400 text-xs">Chiusure</div>
                                <div class="font-semibold text-neutral-900">${campaign.ulixe_chiusure || 0}</div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        <div class="adsets-container hidden pl-8 bg-neutral-50/30" id="adsets-campaign-${campaign.id}"></div>
    `;
    
    return row;
}

async function toggleCampaign(campaignId) {
    const container = document.getElementById(`adsets-campaign-${campaignId}`);
    const icon = document.getElementById(`icon-campaign-${campaignId}`);
    
    if (container.classList.contains('hidden')) {
        // Expand: load adsets
        container.classList.remove('hidden');
        icon.style.transform = 'rotate(90deg)';
        
        if (!adsetsData[campaignId]) {

function escapeHtml(text) {
    const div = document.createElement('div');
    div.textContent = text;
    return div.innerHTML;
}

function updateSummaryCards(totals) {
    document.getElementById('totalMagellanoEntrate').textContent = totals.total_magellano_entrate || 0;
    document.getElementById('totalMagellanoInviate').textContent = totals.total_magellano_inviate || 0;
    document.getElementById('totalUlixeLavorazione').textContent = totals.total_ulixe_lavorazione || 0;
    document.getElementById('totalUlixeChiusure').textContent = totals.total_ulixe_chiusure || 0;
}

function calculateAndUpdateSummaryCards() {
    let totalMagellanoEntrate = 0;
    let totalMagellanoInviate = 0;
    let totalUlixeLavorazione = 0;
    let totalUlixeChiusure = 0;
    
    // Calcola totali delle 4 fasi da tutte le campagne visibili
    campaignsData.forEach(campaign => {
        totalMagellanoEntrate += campaign.magellano_entrate || 0;
        totalMagellanoInviate += campaign.magellano_inviate || 0;
        totalUlixeLavorazione += campaign.ulixe_lavorazione || 0;
        totalUlixeChiusure += campaign.ulixe_chiusure || 0;
    });
    
    updateSummaryCards({
        total_magellano_entrate: totalMagellanoEntrate,
        total_magellano_inviate: totalMagellanoInviate,
        total_ulixe_lavorazione: totalUlixeLavorazione,
        total_ulixe_chiusure: totalUlixeChiusure
    });
}

// Funzione per caricare direttamente gli adsets quando filtrato per adset_name
async function loadAdsetsDirectly(dateFrom, dateTo, accountId, status, campaignName, adsetName) {
    const container = document.getElementById('hierarchicalContainer');
    container.innerHTML = '<div class="p-4 text-center text-neutral-500">Caricamento AdSet...</div>';
    
    let url = `/api/marketing/adsets?date_from=${dateFrom}&date_to=${dateTo}&adset_name=${encodeURIComponent(adsetName)}`;
    if (accountId) {
        url += `&account_id=${accountId}`;
    }
    if (status && status !== 'all') {
        url += `&status=${status}`;
    }
    if (campaignName) {
        url += `&campaign_name=${encodeURIComponent(campaignName)}`;
    }
    
    try {
        const response = await fetch(url);
        if (!response.ok) {
            throw new Error('Errore nel caricamento degli AdSet');
        }
        const adsets = await response.json();
        
        container.innerHTML = '';
        
        if (adsets.length === 0) {
            container.innerHTML = '<div class="p-4 text-center text-neutral-500">Nessun AdSet corrisponde ai filtri</div>';
            updateSummaryCards({ 
                total_magellano_entrate: 0, 
                total_magellano_inviate: 0, 
                total_ulixe_lavorazione: 0, 
                total_ulixe_chiusure: 0 
            });
            return;
        }
        
        // Raggruppa per account e campagna
        const grouped = {};
        adsets.forEach(adset => {
            const key = `${adset.account_id || 'no-account'}_${adset.campaign_id || 'no-campaign'}`;
            if (!grouped[key]) {
                grouped[key] = {
                    account_name: adset.account_name || 'Account non specificato',
                    campaign_name: adset.campaign_name || 'Campagna non specificata',
                    adsets: []
                };
            }
            grouped[key].adsets.push(adset);
        });
        
        Object.values(grouped).forEach(group => {
            // Account/Campaign header
            const header = document.createElement('div');
            header.className = 'account-header bg-indigo-50 border-b-2 border-indigo-200';
            header.innerHTML = `
                <div class="px-6 py-4">
                    <h3 class="text-lg font-semibold text-indigo-900">${escapeHtml(group.account_name)} - ${escapeHtml(group.campaign_name)}</h3>
                    <p class="text-sm text-indigo-600">${group.adsets.length} adset</p>
                </div>
            `;
            container.appendChild(header);
            
            // Adsets
            group.adsets.forEach(adset => {
                const adsetRow = createAdsetRowDirectly(adset);
                container.appendChild(adsetRow);
            });
        });
        
        // Calcola totali
        const totals = {
            total_magellano_entrate: adsets.reduce((sum, a) => sum + (a.magellano_entrate || 0), 0),
            total_magellano_inviate: adsets.reduce((sum, a) => sum + (a.magellano_inviate || 0), 0),
            total_ulixe_lavorazione: adsets.reduce((sum, a) => sum + (a.ulixe_lavorazione || 0), 0),
            total_ulixe_chiusure: adsets.reduce((sum, a) => sum + (a.ulixe_chiusure || 0), 0)
        };
        updateSummaryCards(totals);
    } catch (error) {
        console.error('Error loading adsets:', error);
        container.innerHTML = `<div class="p-4 text-center text-red-500">Errore nel caricamento degli AdSet: ${error.message || error}</div>`;
        updateSummaryCards({ 
            total_magellano_entrate: 0, 
            total_magellano_inviate: 0, 
            total_ulixe_lavorazione: 0, 
            total_ulixe_chiusure: 0 
        });
    }
}

    container.innerHTML = '<div class="p-4 text-center text-neutral-500">Caricamento creatività...</div>';
    
    let url = `/api/marketing/ads?date_from=${dateFrom}&date_to=${dateTo}&ad_name=${encodeURIComponent(adName)}`;
    if (accountId) {
        url += `&account_id=${accountId}`;
    }
    if (status && status !== 'all') {
        url += `&status=${status}`;
    }
    if (campaignName) {
        url += `&campaign_name=${encodeURIComponent(campaignName)}`;
    }
    if (adsetName) {
        url += `&adset_name=${encodeURIComponent(adsetName)}`;
    }
    
    try {
        const response = await fetch(url);
        if (!response.ok) {
            throw new Error('Errore nel caricamento delle creatività');
        }
        const ads = await response.json();
        
        container.innerHTML = '';
        
        if (ads.length === 0) {
            container.innerHTML = '<div class="p-4 text-center text-neutral-500">Nessuna creatività corrisponde ai filtri</div>';
            updateSummaryCards({ 
                total_magellano_entrate: 0, 
                total_magellano_inviate: 0, 
                total_ulixe_lavorazione: 0, 
                total_ulixe_chiusure: 0 
            });
            return;
        }
        
        // Raggruppa per account, campagna e adset
        const grouped = {};
        ads.forEach(ad => {
            const key = `${ad.account_id || 'no-account'}_${ad.campaign_id || 'no-campaign'}_${ad.adset_id || 'no-adset'}`;
            if (!grouped[key]) {
                grouped[key] = {
                    account_name: ad.account_name || 'Account non specificato',
                    campaign_name: ad.campaign_name || 'Campagna non specificata',
                    adset_name: ad.adset_name || 'AdSet non specificato',
                    ads: []
                };
            }
            grouped[key].ads.push(ad);
        });
        
        Object.values(grouped).forEach(group => {
            // Account/Campaign/Adset header
            const header = document.createElement('div');
            header.className = 'account-header bg-indigo-50 border-b-2 border-indigo-200';
            header.innerHTML = `
                <div class="px-6 py-4">
                    <h3 class="text-lg font-semibold text-indigo-900">${escapeHtml(group.account_name)} - ${escapeHtml(group.campaign_name)} - ${escapeHtml(group.adset_name)}</h3>
                    <p class="text-sm text-indigo-600">${group.ads.length} creatività</p>
                </div>
            `;
            container.appendChild(header);
            
            // Ads
            group.ads.forEach(ad => {
                const adRow = createAdRow(ad);
                container.appendChild(adRow);
            });
        });
        
        // Calcola totali
        const totals = {
            total_magellano_entrate: ads.reduce((sum, a) => sum + (a.magellano_entrate || 0), 0),
            total_magellano_inviate: ads.reduce((sum, a) => sum + (a.magellano_inviate || 0), 0),
            total_ulixe_lavorazione: ads.reduce((sum, a) => sum + (a.ulixe_lavorazione || 0), 0),
            total_ulixe_chiusure: ads.reduce((sum, a) => sum + (a.ulixe_chiusure || 0), 0)
        };
        updateSummaryCards(totals);
    } catch (error) {
        console.error('Error loading ads:', error);
        container.innerHTML = `<div class="p-4 text-center text-red-500">Errore nel caricamento delle creatività: ${error.message || error}</div>`;
        updateSummaryCards({ 
            total_magellano_entrate: 0, 
            total_magellano_inviate: 0, 
            total_ulixe_lavorazione: 0, 
            total_ulixe_chiusure: 0 
        });
    }
}

            <div class="flex items-center gap-8 text-sm">

                            </div>
                            <div>
                                <div class="text-neutral-400 text-xs">CPL</div>
                                <div class="font-semibold text-neutral-900">${cplDisplay}</div>
                            </div>
                            <div>
                                <div class="text-neutral-400 text-xs">Speso</div>

                        </div>
                    </div>
                </div>
                <!-- Ingresso Magellano -->
                <div class="flex items-center gap-4 border-r border-neutral-200 pr-6">
                <div class="text-right">
                        <div class="text-xs font-semibold text-neutral-900 uppercase mb-1">Ingresso Magellano</div>
                        <div class="flex items-center gap-3">

                                <div class="text-neutral-400 text-xs">Entrate</div>
                                <div class="font-semibold text-neutral-900">${adset.magellano_entrate || 0}</div>
                            </div>
                            <div>
                                <div class="text-neutral-400 text-xs">CPL</div>
                                <div class="font-semibold text-neutral-900">${adset.cpl_ingresso !== undefined && adset.cpl_ingresso !== null ? (adset.cpl_ingresso > 0 ? '€' + adset.cpl_ingresso.toFixed(2).replace('.', ',') : '€0,00') : '-'}</div>
                            </div>
                            <div>
                                <div class="text-neutral-400 text-xs">Scartate</div>
                                <div class="font-semibold text-neutral-900">${adset.magellano_scartate || 0}</div>
                            </div>
                            <div>
                                <div class="text-neutral-400 text-xs">% Scarto</div>
                                <div class="font-semibold text-neutral-900">${adset.magellano_scarto_pct_ingresso !== undefined && adset.magellano_scarto_pct_ingresso !== null ? adset.magellano_scarto_pct_ingresso.toFixed(2).replace('.', ',') + '%' : '0,00%'}</div>
                            </div>

                    </div>
                </div>
                <!-- Uscita Magellano -->

                                <div class="text-neutral-400 text-xs">CPL</div>

                            </div>
                        </div>
                    </div>

            </div>
        </div>
    `;
    
    return row;
}

// Aggiungi event listener per filtri nome (debounce)
let filterTimeout;
['campaignNameFilter', 'adsetNameFilter', 'adNameFilter'].forEach(filterId => {
    const filterInput = document.getElementById(filterId);
    if (filterInput) {
        filterInput.addEventListener('input', function() {
            clearTimeout(filterTimeout);
            filterTimeout = setTimeout(() => {
                applyFilters();
            }, 500); // Debounce di 500ms
        });
    }
});
</script>
