{% extends "base.html" %}

{% block content %}
<div class="animate-fadeInUp">
    <div class="mb-8">
        <h1 class="text-3xl font-bold gradient-text">Marketing</h1>
        <p class="text-neutral-500 mt-2">
            Vista gerarchica Campagne → AdSet → Creatività con metriche aggregate.
        </p>
    </div>

    <!-- Vista Gerarchica -->
    <!-- Filters -->
    <div class="glass-card mb-6 p-4">
        <form id="filterForm">
            <!-- Prima riga: Account, Stato, Piattaforma, Date, Bottone -->
            <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-6 gap-4 mb-4">
                <div>
                    <label class="block text-xs font-semibold text-neutral-500 uppercase mb-1">Account</label>
                    <select id="accountFilter" onchange="applyFilters()"
                            class="w-full px-4 py-2 rounded-lg border border-neutral-200 focus:ring-2 focus:ring-indigo-500 outline-none">
                        <option value="">Tutti gli account</option>
                    </select>
                </div>
                <div>
                    <label class="block text-xs font-semibold text-neutral-500 uppercase mb-1">Stato</label>
                    <select id="statusFilter" onchange="applyFilters()"
                            class="w-full px-4 py-2 rounded-lg border border-neutral-200 focus:ring-2 focus:ring-indigo-500 outline-none">
                        <option value="all">Tutte</option>
                        <option value="active">Attive</option>
                        <option value="inactive">Non attive</option>
                    </select>
                </div>
                <div>
                    <label class="block text-xs font-semibold text-neutral-500 uppercase mb-1">Piattaforma</label>
                    <select id="platformFilter" onchange="applyFilters()"
                            class="w-full px-4 py-2 rounded-lg border border-neutral-200 focus:ring-2 focus:ring-indigo-500 outline-none">
                        <option value="all">Tutte le piattaforme</option>
                        <option value="facebook">Facebook</option>
                        <option value="instagram">Instagram</option>
                    </select>
                </div>
                <div class="sm:col-span-2 lg:col-span-2">
                    <label class="block text-xs font-semibold text-neutral-500 uppercase mb-1">Periodo</label>
                    <input type="text" id="marketingDateRange"
                           class="w-full px-4 py-2 rounded-lg border border-neutral-200 focus:ring-2 focus:ring-indigo-500 outline-none cursor-pointer"
                           placeholder="Seleziona intervallo">
                    <input type="hidden" id="dateFrom" name="date_from">
                    <input type="hidden" id="dateTo" name="date_to">
                </div>
                <div class="flex items-end">
                    <div class="w-full flex gap-2">
                        <button type="button" onclick="applyFilters()" 
                                class="w-full px-6 py-2 bg-indigo-600 text-white font-semibold rounded-lg hover:bg-indigo-700 shadow-md shadow-indigo-200 transition-all active:scale-95">
                            Applica Filtri
                        </button>
                        <button type="button" id="marketingExportButton"
                                class="w-full px-6 py-2 bg-emerald-600 text-white font-semibold rounded-lg hover:bg-emerald-700 transition-all">
                            Export CSV
                        </button>
                    </div>
                </div>
            </div>
            <!-- Seconda riga: Filtri per nome -->
            <div class="grid grid-cols-1 sm:grid-cols-3 gap-4">
                <div>
                    <label class="block text-xs font-semibold text-neutral-500 uppercase mb-1">Nome Campagna</label>
                    <input type="text" id="campaignNameFilter" placeholder="Cerca campagna..."
                           class="w-full px-4 py-2 rounded-lg border border-neutral-200 focus:ring-2 focus:ring-indigo-500 outline-none">
                </div>
                <div>
                    <label class="block text-xs font-semibold text-neutral-500 uppercase mb-1">Nome AdSet</label>
                    <input type="text" id="adsetNameFilter" placeholder="Cerca adset..."
                           class="w-full px-4 py-2 rounded-lg border border-neutral-200 focus:ring-2 focus:ring-indigo-500 outline-none">
                </div>
                <div>
                    <label class="block text-xs font-semibold text-neutral-500 uppercase mb-1">Nome Inserzione</label>

                           class="w-full px-4 py-2 rounded-lg border border-neutral-200 focus:ring-2 focus:ring-indigo-500 outline-none">
                </div>
            </div>

    </div>

            <div class="p-3 rounded-xl mr-4">
                <svg class="h-6 w-6 text-neutral-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/>
                </svg>
            </div>

                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"/>
                </svg>
            </div>
            <div>
                <p class="text-sm font-medium text-neutral-500">Scartate WS Ulixe</p>
                <p class="text-2xl font-bold text-neutral-900" id="totalUlixeWsScartate">0</p>
            </div>
        </div>
        <div class="glass-card p-6 flex items-center bg-white border border-neutral-200">
            <div class="p-3 rounded-xl mr-4">
                <svg class="h-6 w-6 text-neutral-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/>
                </svg>
            </div>
            <div>
                <p class="text-sm font-medium text-neutral-500">Approvate Ulixe</p>
                <p class="text-2xl font-bold text-neutral-900" id="totalUlixeApprovate">0</p>
            </div>

    <!-- Hierarchical Expandable Structure -->
    <div class="glass-card mb-6 overflow-hidden">
        <div id="hierarchicalContainer" class="divide-y divide-neutral-200">
            <!-- Campaigns will be loaded here -->
        </div>
    </div>

</div>

<script>
// Set default dates e inizializza date range picker
document.addEventListener('DOMContentLoaded', function() {
    const hiddenFrom = document.getElementById('dateFrom');
    const hiddenTo = document.getElementById('dateTo');
    const rangeInput = document.getElementById('marketingDateRange');

    if (hiddenFrom && hiddenTo && rangeInput && window.DateRangePicker && window.moment) {
        function marketingDefaultRangeMoments() {
            const yesterday = moment().subtract(1, 'days');
            let start = moment().startOf('month');
            if (start.isAfter(yesterday, 'day')) {
                start = yesterday.clone();
            }
            return { start: start, end: yesterday };
        }
        const dr = marketingDefaultRangeMoments();
        const start = hiddenFrom.value ? moment(hiddenFrom.value, 'YYYY-MM-DD') : dr.start;
        const end = hiddenTo.value ? moment(hiddenTo.value, 'YYYY-MM-DD') : dr.end;

        hiddenFrom.value = start.format('YYYY-MM-DD');
        hiddenTo.value = end.format('YYYY-MM-DD');

        new DateRangePicker(rangeInput, {
            startDate: start,
            endDate: end,
            autoApply: true,
            alwaysShowCalendars: true,
            opens: 'left',
            maxSpan: { days: 365 },
            locale: {
                format: 'DD/MM/YYYY',
                separator: ' al ',
                applyLabel: 'Aggiorna',
                cancelLabel: 'Annulla',
                weekLabel: 'Set',
                daysOfWeek: ['Dom', 'Lun', 'Mar', 'Mer', 'Gio', 'Ven', 'Sab'],
                monthNames: ['Gennaio', 'Febbraio', 'Marzo', 'Aprile', 'Maggio', 'Giugno', 'Luglio', 'Agosto', 'Settembre', 'Ottobre', 'Novembre', 'Dicembre'],
                firstDay: 1
            },
            ranges: {
                'Oggi': [moment(), moment()],
                'Ieri': [moment().subtract(1, 'days'), moment().subtract(1, 'days')],
                'Ultimi 7 giorni': [moment().subtract(6, 'days'), moment()],
                'Ultimi 14 giorni': [moment().subtract(13, 'days'), moment()],
                'Ultimi 28 giorni': [moment().subtract(27, 'days'), moment()],
                'Ultimi 30 giorni': [moment().subtract(29, 'days'), moment()],
                'Ultimi 60 giorni': [moment().subtract(59, 'days'), moment()],
                'Mese → ieri': (function () {
                    const y = moment().subtract(1, 'days');
                    let s = moment().startOf('month');
                    if (s.isAfter(y, 'day')) s = y.clone();
                    return [s, y];
                })(),
                'Gennaio 2026': [moment('2026-01-01'), moment('2026-01-31')],
                'Questa settimana': [moment().startOf('week').add(1, 'days'), moment().endOf('week').add(1, 'days')],
                'Settimana scorsa': [
                    moment().subtract(1, 'week').startOf('week').add(1, 'days'),
                    moment().subtract(1, 'week').endOf('week').add(1, 'days')
                ],
                'Questo mese': [moment().startOf('month'), moment().endOf('month')],
                'Mese scorso': [
                    moment().subtract(1, 'month').startOf('month'),
                    moment().subtract(1, 'month').endOf('month')
                ]
            }
        }, function (startDate, endDate) {
            hiddenFrom.value = startDate.format('YYYY-MM-DD');
            hiddenTo.value = endDate.format('YYYY-MM-DD');
            applyFilters();
        });
    } else if (hiddenFrom && hiddenTo) {
        const today = new Date();
        today.setHours(0, 0, 0, 0);
        const yesterday = new Date(today);
        yesterday.setDate(yesterday.getDate() - 1);
        const monthStart = new Date(today.getFullYear(), today.getMonth(), 1);
        let fromD = monthStart;
        if (fromD > yesterday) {
            fromD = new Date(yesterday);
        }
        hiddenFrom.value = fromD.toISOString().split('T')[0];
        hiddenTo.value = yesterday.toISOString().split('T')[0];
    }
    
    // Load thresholds, accounts and campaigns on page load
    loadThresholds().then(() => {
        loadAccounts();
        loadAllCampaigns();
    });
});

let campaignsData = [];
let accountsData = [];
let adsetsData = {}; // campaignId -> adsets array
let adsData = {}; // adsetId -> ads array

/** Invalida cache gerarchia: date/piattaforma/filtri cambiano ma campaign viene refetchata; adset/ads no senza questo. */
function clearMarketingHierarchyCache() {
    adsetsData = {};
    adsData = {};
}
let creativeImageObserver = null;
let thresholdsConfig = {
    margine_rosso_fino: 0,
    margine_verde_da: 15,
    scarto_verde_fino: 5,
    scarto_rosso_da: 20,
    colori_margine_rosso: true,
    colori_margine_verde: true,
    colori_scarto_verde: true,
    colori_scarto_rosso: true
};

function getCreativeImageObserver() {
    if (creativeImageObserver) {
        return creativeImageObserver;
    }

    creativeImageObserver = new IntersectionObserver((entries, observer) => {
        entries.forEach(entry => {
            if (!entry.isIntersecting) {
                return;
            }
            const img = entry.target;
            const realSrc = img.getAttribute('data-src');
            if (realSrc && !img.getAttribute('src')) {
                img.setAttribute('src', realSrc);
            }
            observer.unobserve(img);
        });
    }, {
        root: null,
        rootMargin: '200px 0px',
        threshold: 0.01
    });

    return creativeImageObserver;
}

function observeLazyCreativeImages(container) {
    const observer = getCreativeImageObserver();
    const lazyImages = container.querySelectorAll('img.lazy-creative-image[data-src]');
    lazyImages.forEach(img => observer.observe(img));
}

async function requestMarketingExport() {
    const btn = document.getElementById('marketingExportButton');
    if (!btn) return;
    const originalLabel = btn.textContent;
    btn.disabled = true;
    btn.textContent = 'Export in corso...';
    try {
        const params = new URLSearchParams({
            account_id: document.getElementById('accountFilter').value || '',
            status: document.getElementById('statusFilter').value || 'all',
            platform: document.getElementById('platformFilter').value || 'all',
            campaign_name: document.getElementById('campaignNameFilter').value.trim(),
            adset_name: document.getElementById('adsetNameFilter').value.trim(),
            ad_name: document.getElementById('adNameFilter').value.trim(),
            date_from: document.getElementById('dateFrom').value || '',
            date_to: document.getElementById('dateTo').value || '',
        });
        const response = await fetch(`/api/marketing/export-request?${params.toString()}`);
        const data = await response.json();
        if (!response.ok) {
            throw new Error(data.error || 'Errore avvio export');
        }
        alert(data.message || 'Export avviato correttamente.');
    } catch (error) {
        alert(error.message || 'Errore avvio export.');
    } finally {
        btn.disabled = false;
        btn.textContent = originalLabel;
    }
}

async function loadThresholds() {
    try {
        const r = await fetch('/api/marketing/thresholds');
        if (r.ok) {
            thresholdsConfig = await r.json();
        }
    } catch (e) {
        console.warn('Impossibile caricare soglie marketing:', e);
    }
}

function getScartoColorClass(val) {
    if (val == null || val === undefined || isNaN(val)) return '';
    const v = parseFloat(val);
    const bothActive = thresholdsConfig.colori_scarto_verde && thresholdsConfig.colori_scarto_rosso;
    if (v <= thresholdsConfig.scarto_verde_fino && thresholdsConfig.colori_scarto_verde) return 'text-green-600 font-semibold';
    if (v >= thresholdsConfig.scarto_rosso_da && thresholdsConfig.colori_scarto_rosso) return 'text-red-600 font-semibold';
    if (bothActive) return 'text-orange-500 font-semibold';  // arancione solo se verde + rosso entrambi attivi
    return 'font-semibold text-neutral-900';
}

async function loadAccounts() {
    try {
        const response = await fetch('/api/marketing/accounts');
        accountsData = await response.json();
        
        const accountSelect = document.getElementById('accountFilter');
        accountSelect.innerHTML = '<option value="">Tutti gli account</option>';
        
        accountsData.forEach(account => {
            const option = document.createElement('option');
            option.value = account.id;
            option.textContent = account.name || account.account_id;
            accountSelect.appendChild(option);
        });
    } catch (error) {
        console.error('Error loading accounts:', error);
    }
}

async function applyFilters() {
    loadAllCampaigns();
}

async function loadAllCampaigns() {
    clearMarketingHierarchyCache();

    const container = document.getElementById('hierarchicalContainer');
    container.innerHTML = '<div class="p-4 text-center text-neutral-500">Caricamento...</div>';
    
    const dateFrom = document.getElementById('dateFrom').value;
    const dateTo = document.getElementById('dateTo').value;
    const accountId = document.getElementById('accountFilter').value;
    const status = document.getElementById('statusFilter').value;
    const platform = document.getElementById('platformFilter').value || 'all';
    const campaignName = document.getElementById('campaignNameFilter').value.trim();
    const adsetName = document.getElementById('adsetNameFilter').value.trim();
    const adName = document.getElementById('adNameFilter').value.trim();
    
    // Se c'è un filtro per ad_name, mostra direttamente le ads
    if (adName) {
        await loadAdsDirectly(dateFrom, dateTo, accountId, status, campaignName, adsetName, adName);
        return;
    }
    
    // Se c'è un filtro per adset_name, mostra direttamente gli adsets
    if (adsetName) {
        await loadAdsetsDirectly(dateFrom, dateTo, accountId, status, campaignName, adsetName);
        return;
    }
    
    // Altrimenti mostra le campagne normalmente
    let url = `/api/marketing/campaigns?date_from=${dateFrom}&date_to=${dateTo}`;
    if (accountId) {
        url += `&account_id=${accountId}`;
    }
    if (status && status !== 'all') {
        url += `&status=${status}`;
    }
    if (platform && platform !== 'all') {
        url += `&platform=${platform}`;
    }
    if (campaignName) {
        url += `&campaign_name=${encodeURIComponent(campaignName)}`;
    }
    
    try {
        const response = await fetch(url);
        if (!response.ok) {
            const errorText = await response.text();
            console.error('Errore risposta API:', response.status, errorText);
            let errorMessage = 'Errore nel caricamento delle campagne';
            try {
                const errorData = JSON.parse(errorText);
                if (errorData.error) {
                    errorMessage = errorData.error;
                }
            } catch (e) {
                // Ignora se non è JSON
            }
            container.innerHTML = `<div class="p-4 text-center text-red-500">${errorMessage}</div>`;
            updateSummaryCards({ 
                total_magellano_entrate: 0, 
                total_magellano_inviate: 0, 
                total_ulixe_ws_scartate: 0, 
                total_ulixe_approvate: 0 
            });
            return;
        }
        
        let data;
        try {
            data = await response.json();
        } catch (jsonError) {
            console.error('Errore parsing JSON:', jsonError);
            container.innerHTML = '<div class="p-4 text-center text-red-500">Errore nel formato della risposta</div>';
            updateSummaryCards({ 
                total_magellano_entrate: 0, 
                total_magellano_inviate: 0, 
                total_ulixe_ws_scartate: 0, 
                total_ulixe_approvate: 0 
            });
            return;
        }
        
        // Gestisci sia formato nuovo (con campaigns e totals) che vecchio (solo array)
        if (Array.isArray(data)) {
            campaignsData = data;
        } else if (data && Array.isArray(data.campaigns)) {
            campaignsData = data.campaigns;
        } else {
            console.error('Formato risposta non valido:', data);
            container.innerHTML = '<div class="p-4 text-center text-red-500">Formato risposta non valido</div>';
            updateSummaryCards({ 
                total_magellano_entrate: 0, 
                total_magellano_inviate: 0, 
                total_ulixe_ws_scartate: 0, 
                total_ulixe_approvate: 0 
            });
            return;
        }
        
        // Aggiorna le card riepilogative se disponibili
        if (data.totals) {
            updateSummaryCards(data.totals);
        } else {
            // Calcola totali lato client se non disponibili
            calculateAndUpdateSummaryCards();
        }
        
        console.log('Campagne ricevute:', campaignsData.length);
        if (campaignsData.length > 0) {
            console.log('Prima campagna (esempio):', campaignsData[0]);
            console.log('Lead:', campaignsData[0].total_leads, 'CPL:', campaignsData[0].cpl_meta, 'Spend:', campaignsData[0].spend);
        }
        
        container.innerHTML = '';
        
        if (campaignsData.length === 0) {
            container.innerHTML = '<div class="p-4 text-center text-neutral-500">Nessuna campagna disponibile</div>';
            updateSummaryCards({ 
                total_magellano_entrate: 0, 
                total_magellano_inviate: 0, 
                total_ulixe_ws_scartate: 0, 
                total_ulixe_approvate: 0 
            });
            return;
        }
        
        // Group campaigns by account
        const campaignsByAccount = {};
        campaignsData.forEach(campaign => {
            const accountId = campaign.account_id || 'no-account';
            const accountName = campaign.account_name || 'Account non specificato';
            
            if (!campaignsByAccount[accountId]) {
                campaignsByAccount[accountId] = {
                    id: accountId,
                    name: accountName,
                    campaigns: []
                };
            }
            campaignsByAccount[accountId].campaigns.push(campaign);
        });
        
        // Display campaigns grouped by account
        Object.values(campaignsByAccount).forEach(accountGroup => {
            // Account header
            const accountHeader = document.createElement('div');
            accountHeader.className = 'account-header bg-indigo-50 border-b-2 border-indigo-200';
            accountHeader.innerHTML = `
                <div class="px-6 py-4">
                    <h3 class="text-lg font-semibold text-indigo-900">${escapeHtml(accountGroup.name)}</h3>
                    <p class="text-sm text-indigo-600">${accountGroup.campaigns.length} campagna${accountGroup.campaigns.length !== 1 ? 'e' : ''}</p>
                </div>
            `;
            container.appendChild(accountHeader);
            
            // Campaigns for this account
            accountGroup.campaigns.forEach(campaign => {
                const campaignRow = createCampaignRow(campaign);
                container.appendChild(campaignRow);
            });
        });
    } catch (error) {
        console.error('Error loading campaigns:', error);
        container.innerHTML = `<div class="p-4 text-center text-red-500">Errore nel caricamento delle campagne: ${error.message || error}</div>`;
        updateSummaryCards({ 
            total_magellano_entrate: 0, 
            total_magellano_inviate: 0,

            total_ulixe_approvate: 0

}

async function toggleCampaign(campaignId) {
    const container = document.getElementById(`adsets-campaign-${campaignId}`);
    const icon = document.getElementById(`icon-campaign-${campaignId}`);
    
    if (container.classList.contains('hidden')) {
        // Expand: load adsets
        container.classList.remove('hidden');
        icon.style.transform = 'rotate(90deg)';
        
        if (!adsetsData[campaignId]) {
            await loadAdsetsForCampaign(campaignId);
        } else {
            displayAdsets(campaignId, adsetsData[campaignId]);
        }
    } else {
        // Collapse
        container.classList.add('hidden');
        icon.style.transform = 'rotate(0deg)';
    }
}

async function loadAdsetsForCampaign(campaignId) {
    const container = document.getElementById(`adsets-campaign-${campaignId}`);
    container.innerHTML = '<div class="p-4 text-center text-neutral-500">Caricamento AdSet...</div>';
    
    const dateFrom = document.getElementById('dateFrom').value;
    const dateTo = document.getElementById('dateTo').value;
    const platform = document.getElementById('platformFilter').value || 'all';
    
    try {
        let url = `/api/marketing/campaigns/${campaignId}/adsets?date_from=${dateFrom}&date_to=${dateTo}`;
        if (platform && platform !== 'all') {
            url += `&platform=${platform}`;
        }
        const response = await fetch(url);
        const adsets = await response.json();
        adsetsData[campaignId] = adsets;
        displayAdsets(campaignId, adsets);
    } catch (error) {
        console.error('Error loading adsets:', error);
        container.innerHTML = '<div class="p-4 text-center text-red-500">Errore nel caricamento degli AdSet</div>';
    }
}

function displayAdsets(campaignId, adsets) {
    const container = document.getElementById(`adsets-campaign-${campaignId}`);
    container.innerHTML = '';
    
    if (adsets.length === 0) {
        container.innerHTML = '<div class="p-4 text-center text-neutral-500">Nessun AdSet disponibile</div>';
        return;
    }
    
    // Applica filtro adset se presente
    const adsetNameFilter = document.getElementById('adsetNameFilter').value.trim().toLowerCase();
    const filteredAdsets = adsetNameFilter 
        ? adsets.filter(adset => adset.name.toLowerCase().includes(adsetNameFilter))
        : adsets;
    
    if (filteredAdsets.length === 0) {
        container.innerHTML = '<div class="p-4 text-center text-neutral-500">Nessun AdSet corrisponde ai filtri</div>';
        return;
    }
    
    filteredAdsets.forEach(adset => {
        const adsetRow = createAdsetRow(campaignId, adset);
        container.appendChild(adsetRow);
    });
}

    // Applica filtro ad se presente
    const adNameFilter = document.getElementById('adNameFilter').value.trim().toLowerCase();
    const filteredAds = adNameFilter 
        ? ads.filter(ad => ad.name.toLowerCase().includes(adNameFilter))
        : ads;
    
    if (filteredAds.length === 0) {
        container.innerHTML = '<div class="p-4 text-center text-neutral-500">Nessuna creatività corrisponde ai filtri</div>';
        return;
    }
    
    filteredAds.forEach(ad => {
        const adRow = createAdRow(ad);
        container.appendChild(adRow);
    });
    observeLazyCreativeImages(container);
}

function escapeHtml(text) {
    const div = document.createElement('div');
    div.textContent = text;
    return div.innerHTML;
}

/** Valore sicuro per attributo HTML (es. data-meta-id). */
function escapeHtmlAttr(text) {
    return String(text)
        .replace(/&/g, '&amp;')
        .replace(/"/g, '&quot;')
        .replace(/</g, '&lt;');
}

/**
 * Copia l'ID Meta al click (campagna / ad set / creatività).
 * Mostra un bubble "Copiato!" (non usiamo copyIdToClipboard: sostituirebbe textContent e rimuoverebbe icona/tooltip).
 */
function copyMarketingMetaId(event) {
    event.preventDefault();
    event.stopPropagation();
    const btn = event.currentTarget;
    const id = btn.getAttribute('data-meta-id') || '';
    if (!id) return;

    const tip = btn.querySelector('.meta-id-copy-tooltip');
    function showCopiedBubble() {
        if (!tip) return;
        tip.classList.remove('opacity-0', 'invisible');
        tip.classList.add('opacity-100');
        if (btn._metaIdCopyTipTimeout) {
            clearTimeout(btn._metaIdCopyTipTimeout);
        }
        btn._metaIdCopyTipTimeout = setTimeout(function () {
            tip.classList.add('opacity-0', 'invisible');
            tip.classList.remove('opacity-100');
        }, 1800);
    }

    function fallbackCopy() {
        try {
            const ta = document.createElement('textarea');
            ta.value = id;
            ta.setAttribute('readonly', '');
            ta.style.position = 'fixed';
            ta.style.left = '-9999px';
            document.body.appendChild(ta);
            ta.select();
            document.execCommand('copy');
            document.body.removeChild(ta);
            showCopiedBubble();
        } catch (e) { /* ignore */ }
    }

    if (navigator.clipboard && navigator.clipboard.writeText) {
        navigator.clipboard.writeText(id).then(showCopiedBubble).catch(fallbackCopy);
    } else {
        fallbackCopy();
    }
}

/** ID Meta tra nome e badge; nessun markup se il valore manca (stringa vuota). */
function metaIdHtmlLine(metaId) {
    if (metaId == null || String(metaId).trim() === '') {
        return '';
    }
    const id = String(metaId).trim();
    const safeAttr = escapeHtmlAttr(id);
    var copyIcon =
        '<svg class="shrink-0 w-3.5 h-3.5 text-neutral-400 group-hover:text-indigo-600 transition-colors" ' +
        'fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true">' +
        '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" ' +
        'd="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z"/>' +
        '</svg>';
    return (
        '<button type="button" class="group meta-id-copy relative inline-flex max-w-full items-center text-left ' +
        'cursor-pointer border-0 bg-transparent p-0 ' +
        'focus:outline-none focus-visible:ring-2 focus-visible:ring-indigo-400 focus-visible:ring-offset-1 rounded" ' +
        'data-meta-id="' + safeAttr + '" title="Clicca per copiare" aria-label="Copia ID Meta negli appunti" ' +
        'onclick="copyMarketingMetaId(event)">' +
        '<span class="meta-id-copy-tooltip pointer-events-none absolute left-0 top-full z-10 mt-1 whitespace-nowrap ' +
        'rounded bg-neutral-800 px-2 py-1 text-[10px] font-medium font-sans tracking-normal text-white shadow-md ' +
        'opacity-0 invisible transition-opacity duration-150" role="status" aria-live="polite">Copiato!</span>' +
        '<span class="inline-flex min-w-0 flex-1 items-center gap-1.5">' +
        copyIcon +
        '<span class="truncate font-mono text-xs tracking-tight text-neutral-400 group-hover:text-indigo-600 ' +
        'group-hover:underline">' +
        escapeHtml(id) +
        '</span></span></button>'
    );
}

    document.getElementById('totalMagellanoInviate').textContent = totals.total_magellano_inviate || 0;

    document.getElementById('totalUlixeApprovate').textContent = totals.total_ulixe_approvate || 0;
}

function calculateAndUpdateSummaryCards() {
    let totalMagellanoEntrate = 0;
    let totalMagellanoInviate = 0;
    let totalUlixeWsScartate = 0;
    let totalUlixeApprovate = 0;
    
    // Calcola totali delle 4 fasi da tutte le campagne visibili
    campaignsData.forEach(campaign => {
        totalMagellanoEntrate += campaign.magellano_entrate || 0;
        totalMagellanoInviate += campaign.magellano_inviate || 0;
        totalUlixeWsScartate += campaign.ulixe_ws_scartate || 0;

    updateSummaryCards({

// Funzione per caricare direttamente gli adsets quando filtrato per adset_name
async function loadAdsetsDirectly(dateFrom, dateTo, accountId, status, campaignName, adsetName) {
    const container = document.getElementById('hierarchicalContainer');
    container.innerHTML = '<div class="p-4 text-center text-neutral-500">Caricamento AdSet...</div>';
    
    const platform = document.getElementById('platformFilter').value || 'all';

    let url = `/api/marketing/adsets?date_from=${dateFrom}&date_to=${dateTo}&adset_name=${encodeURIComponent(adsetName)}`;
    if (accountId) {
        url += `&account_id=${accountId}`;
    }
    if (status && status !== 'all') {
        url += `&status=${status}`;
    }
    if (campaignName) {
        url += `&campaign_name=${encodeURIComponent(campaignName)}`;
    }
    if (platform && platform !== 'all') {
        url += `&platform=${platform}`;
    }
    
    try {
        const response = await fetch(url);
        if (!response.ok) {
            throw new Error('Errore nel caricamento degli AdSet');
        }
        const adsets = await response.json();
        
        container.innerHTML = '';
        
        if (adsets.length === 0) {
            container.innerHTML = '<div class="p-4 text-center text-neutral-500">Nessun AdSet corrisponde ai filtri</div>';
            updateSummaryCards({ 
                total_magellano_entrate: 0, 
                total_magellano_inviate: 0, 
                total_ulixe_ws_scartate: 0, 
                total_ulixe_approvate: 0 
            });
            return;
        }
        
        // Raggruppa per account e campagna
        const grouped = {};
        adsets.forEach(adset => {
            const key = `${adset.account_id || 'no-account'}_${adset.campaign_id || 'no-campaign'}`;
            if (!grouped[key]) {
                grouped[key] = {
                    account_name: adset.account_name || 'Account non specificato',
                    campaign_name: adset.campaign_name || 'Campagna non specificata',
                    adsets: []
                };
            }
            grouped[key].adsets.push(adset);
        });
        
        Object.values(grouped).forEach(group => {
            // Account/Campaign header
            const header = document.createElement('div');
            header.className = 'account-header bg-indigo-50 border-b-2 border-indigo-200';
            header.innerHTML = `
                <div class="px-6 py-4">
                    <h3 class="text-lg font-semibold text-indigo-900">${escapeHtml(group.account_name)} - ${escapeHtml(group.campaign_name)}</h3>
                    <p class="text-sm text-indigo-600">${group.adsets.length} adset</p>
                </div>
            `;
            container.appendChild(header);
            
            // Adsets
            group.adsets.forEach(adset => {
                const adsetRow = createAdsetRowDirectly(adset);
                container.appendChild(adsetRow);
            });
        });
        
        // Calcola totali
        const totals = {
            total_magellano_entrate: adsets.reduce((sum, a) => sum + (a.magellano_entrate || 0), 0),
            total_magellano_inviate: adsets.reduce((sum, a) => sum + (a.magellano_inviate || 0), 0),
            total_ulixe_ws_scartate: adsets.reduce((sum, a) => sum + (a.ulixe_ws_scartate || 0), 0),
            total_ulixe_approvate: adsets.reduce((sum, a) => sum + (a.ulixe_approvate || 0), 0)
        };
        updateSummaryCards(totals);
    } catch (error) {
        console.error('Error loading adsets:', error);
        container.innerHTML = `<div class="p-4 text-center text-red-500">Errore nel caricamento degli AdSet: ${error.message || error}</div>`;
        updateSummaryCards({ 
            total_magellano_entrate: 0, 
            total_magellano_inviate: 0, 
            total_ulixe_ws_scartate: 0, 
            total_ulixe_approvate: 0 
        });
    }
}

                                <div class="font-semibold text-neutral-900">€${(adset.spend || 0).toFixed(2).replace('.', ',')}</div>
                            </div>
                        </div>
                    </div>
                </div>
                <!-- Ingresso Magellano -->
                <div class="flex items-center gap-4 border-r border-neutral-200 pr-6">
                <div class="text-right">
                        <div class="mb-1 flex items-center justify-end gap-0.5">
                            <span class="text-xs font-semibold text-neutral-900 uppercase">Ingresso Magellano</span>
                            ${marketingMetricLegendDetails('ingresso_magellano')}
                        </div>
                        <div class="flex items-center gap-3">
                            <div>
                                <div class="text-neutral-400 text-xs">Entrate</div>
                                <div class="font-semibold text-neutral-900">${adset.magellano_entrate || 0}</div>
                            </div>
                            <div>
                                <div class="text-neutral-400 text-xs">CPL</div>
                                <div class="font-semibold text-neutral-900">${adset.cpl_ingresso !== undefined && adset.cpl_ingresso !== null ? (adset.cpl_ingresso > 0 ? '€' + adset.cpl_ingresso.toFixed(2).replace('.', ',') : '€0,00') : '-'}</div>
                            </div>
                            <div>
                                <div class="text-neutral-400 text-xs">Scartate</div>
                                <div class="font-semibold text-neutral-900">${adset.magellano_scartate || 0}</div>
                            </div>
                            <div>
                                <div class="text-neutral-400 text-xs">% Scarto</div>
                                <div class="${getScartoColorClass(adset.magellano_scarto_pct_ingresso) || 'font-semibold text-neutral-900'}">${adset.magellano_scarto_pct_ingresso !== undefined && adset.magellano_scarto_pct_ingresso !== null ? adset.magellano_scarto_pct_ingresso.toFixed(2).replace('.', ',') + '%' : '0,00%'}</div>
                            </div>
                        </div>
                    </div>
                </div>
                <!-- Uscita Magellano -->
                <div class="flex items-center gap-4 border-r border-neutral-200 pr-6">
                    <div class="text-right">
                        <div class="mb-1 flex items-center justify-end gap-0.5">
                            <span class="text-xs font-semibold text-neutral-900 uppercase">Uscita Magellano</span>
                            ${marketingMetricLegendDetails('uscita_magellano')}
                        </div>
                        <div class="flex items-center gap-3">
                            <div>
                                <div class="text-neutral-400 text-xs">Inviate</div>
                                <div class="font-semibold text-neutral-900">${adset.magellano_inviate || 0}</div>
                            </div>
                            <div>
                                <div class="text-neutral-400 text-xs">CPL</div>
                                <div class="font-semibold text-neutral-900">${adset.cpl_uscita !== undefined && adset.cpl_uscita !== null ? (adset.cpl_uscita > 0 ? '€' + adset.cpl_uscita.toFixed(2).replace('.', ',') : '€0,00') : '-'}</div>
                            </div>
                            <div>
                                <div class="text-neutral-400 text-xs">Rifiutate</div>
                                <div class="font-semibold text-neutral-900">${adset.magellano_rifiutate || 0}</div>
                            </div>
                            <div>
                                <div class="text-neutral-400 text-xs">% Scarto</div>
                                <div class="${getScartoColorClass(adset.magellano_scarto_pct_uscita) || 'font-semibold text-neutral-900'}">${adset.magellano_scarto_pct_uscita !== undefined && adset.magellano_scarto_pct_uscita !== null ? adset.magellano_scarto_pct_uscita.toFixed(2).replace('.', ',') + '%' : '0,00%'}</div>
                            </div>
                        </div>
                    </div>
                </div>
                <!-- Ulixe (solo scartate WS) -->
                <div class="flex items-center gap-4 border-r border-neutral-200 pr-6">
                    <div class="text-right">
                        <div class="mb-1 flex items-center justify-end gap-0.5">
                            <span class="text-xs font-semibold text-neutral-900 uppercase">Ulixe</span>
                            ${marketingMetricLegendDetails('ulixe')}
                        </div>
                        <div class="flex items-center gap-3">
                            <div>
                                <div class="text-neutral-400 text-xs">Scartate WS</div>
                                <div class="font-semibold text-neutral-900">${adset.ulixe_ws_scartate || 0}</div>
                            </div>
                        </div>
                    </div>
                </div>
                <!-- Scarto totale + CPL finale -->
                <div class="flex items-center gap-6">
                    <div class="text-right">
                        <div class="mb-1 flex items-center justify-end gap-0.5">
                            <span class="text-xs font-semibold text-neutral-900 uppercase">Scarto totale</span>
                            ${marketingMetricLegendDetails('scarto_totale')}
                        </div>
                        <div class="${getScartoColorClass(adset.scarto_totale_pct) || 'font-semibold text-neutral-900'}">${adset.scarto_totale_pct != null ? adset.scarto_totale_pct.toFixed(2).replace('.', ',') + '%' : '0,00%'}</div>
                    </div>
                    <div class="text-right">
                        <div class="mb-1 flex items-center justify-end gap-0.5">
                            <span class="text-xs font-semibold text-neutral-900 uppercase">CPL finale</span>
                            ${marketingMetricLegendDetails('cpl_finale')}
                        </div>
                        <div class="font-semibold text-neutral-900">${adset.cpl_finale_reale != null && adset.cpl_finale_reale !== undefined ? '€' + Number(adset.cpl_finale_reale).toFixed(2).replace('.', ',') : 'N/D'}</div>
                    </div>
                </div>
            </div>
        </div>
    `;
    
    return row;
}

// Aggiungi event listener per filtri nome (debounce)
let filterTimeout;
['campaignNameFilter', 'adsetNameFilter', 'adNameFilter'].forEach(filterId => {
    const filterInput = document.getElementById(filterId);
    if (filterInput) {
        filterInput.addEventListener('input', function() {
            clearTimeout(filterTimeout);
            filterTimeout = setTimeout(() => {
                applyFilters();
            }, 500); // Debounce di 500ms
        });
    }
});

const marketingExportButton = document.getElementById('marketingExportButton');
if (marketingExportButton) {
    marketingExportButton.addEventListener('click', requestMarketingExport);
}
</script>
