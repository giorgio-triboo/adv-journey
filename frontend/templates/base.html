<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ title }} - Cepu Lavorazioni</title>
    <meta name="description" content="Sistema di gestione lead Cepu - Dashboard moderna e intuitiva">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    {% if user %}
    <aside class="sidebar">
        <div class="sidebar-header">
            <h1 class="text-2xl font-bold gradient-text">Cepu System</h1>
        </div>
        
        <div class="sidebar-content">
            <nav>
                <a href="/dashboard" class="nav-item {% if active_page == 'dashboard' %}active{% endif %}">
                    <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/>
                    </svg>
                    Dashboard
                </a>
                <a href="/analytics" class="nav-item {% if active_page == 'analytics' %}active{% endif %}">
                    <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"/>
                    </svg>
                    Analytics 360°
                </a>

                <div class="nav-dropdown">
                    <div class="nav-item nav-dropdown-trigger" onclick="toggleSubmenu('config-menu')">
                        <div class="flex items-center">
                            <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"/>
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
                            </svg>
                            Configurazioni
                        </div>
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"/>
                        </svg>
                    </div>
                    <div id="config-menu" class="nav-submenu {% if active_page in ['users', 'campaigns', 'meta_accounts', 'meta_campaigns'] %}open{% endif %}">
                        <a href="/settings/users" class="nav-item {% if active_page == 'users' %}active{% endif %}">
                            Utenti
                        </a>
                        <a href="/settings/campaigns" class="nav-item {% if active_page == 'campaigns' %}active{% endif %}">
                            Campagne Magellano
                        </a>
                        <a href="/settings/meta-accounts" class="nav-item {% if active_page == 'meta_accounts' %}active{% endif %}">
                            Account Meta
                        </a>
                        <a href="/settings/meta-campaigns" class="nav-item {% if active_page == 'meta_campaigns' %}active{% endif %}">
                            Campagne Meta
                        </a>
                    </div>
                </div>
            </nav>
        </div>

        <div class="sidebar-footer">
            <div class="profile-badge">
                <div class="profile-avatar">
                    {{ user.email[0].upper() }}
                </div>
                <div class="profile-info">
                    <p class="profile-name">{{ user.email }}</p>
                    <p class="profile-role">Amministratore</p>
                </div>
            </div>
            <a href="/logout" class="btn-logout">
                <svg class="w-4 h-4 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/>
                </svg>
                Logout
            </a>
        </div>
    </aside>
    {% endif %}
    
    <main class="{% if user %}main-layout{% else %}max-w-7xl mx-auto py-8 px-4{% endif %}">
        {% block content %}
        <div class="glass-card p-8 animate-fadeInUp">
            <h1 class="text-3xl font-bold gradient-text">Benvenuto</h1>
        </div>
        {% block extra_content %}{% endblock %}
        {% endblock %}
    </main>

    <script>
        function toggleSubmenu(id) {
            const menu = document.getElementById(id);
            menu.classList.toggle('open');
        }
    </script>
</body>
</html>
